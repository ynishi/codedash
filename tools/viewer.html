<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>codedash viewer</title>
<style>
:root {
  --bg: #0d1117;
  --bg2: #161b22;
  --bg3: #21262d;
  --fg: #c9d1d9;
  --fg2: #8b949e;
  --border: #30363d;
  --accent: #58a6ff;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
  background: var(--bg);
  color: var(--fg);
  line-height: 1.5;
}

/* ── Drop zone ── */
#drop-zone {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  min-height: 100vh;
  gap: 16px;
}
#drop-zone.hidden { display: none; }
.drop-area {
  width: 480px;
  height: 200px;
  border: 2px dashed var(--border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 12px;
  cursor: pointer;
  transition: border-color 0.2s;
}
.drop-area:hover, .drop-area.dragover {
  border-color: var(--accent);
}
.drop-area p { color: var(--fg2); }
.drop-area input { display: none; }

/* ── Main layout ── */
#app { display: none; padding: 20px 24px; }
#app.visible { display: block; }

header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 20px;
  padding-bottom: 12px;
  border-bottom: 1px solid var(--border);
}
header h1 { font-size: 18px; font-weight: 600; }
.stats { display: flex; gap: 20px; font-size: 13px; color: var(--fg2); }
.stats .val { color: var(--fg); font-weight: 600; }

/* ── Controls ── */
.controls {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  align-items: center;
}
.controls select, .controls input {
  background: var(--bg2);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 6px 10px;
  border-radius: 6px;
  font-size: 13px;
}
.controls input { width: 220px; }
.controls label { font-size: 13px; color: var(--fg2); margin-right: 4px; }
.btn {
  background: var(--bg3);
  border: 1px solid var(--border);
  color: var(--fg);
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
}
.btn:hover { border-color: var(--accent); }
.btn.active { background: var(--accent); color: #000; border-color: var(--accent); }

/* ── Treemap ── */
#treemap {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
  align-content: flex-start;
  margin-bottom: 24px;
}
.tnode {
  border-radius: 4px;
  padding: 4px 6px;
  font-size: 11px;
  overflow: hidden;
  cursor: pointer;
  transition: outline 0.15s;
  display: flex;
  align-items: flex-start;
  line-height: 1.3;
  min-width: 32px;
  min-height: 24px;
  position: relative;
}
.tnode:hover { outline: 2px solid #fff; z-index: 1; }
.tnode .label {
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
  color: #fff;
  text-shadow: 0 1px 2px rgba(0,0,0,0.7);
  font-weight: 500;
}

/* ── Table ── */
#table-wrap { overflow-x: auto; }
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13px;
}
th {
  text-align: left;
  padding: 8px 10px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  cursor: pointer;
  user-select: none;
  white-space: nowrap;
  position: sticky;
  top: 0;
  z-index: 2;
}
th:hover { color: var(--accent); }
th .arrow { margin-left: 4px; font-size: 10px; }
td {
  padding: 6px 10px;
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tr:hover td { background: var(--bg2); }
.kind-badge {
  display: inline-block;
  padding: 1px 6px;
  border-radius: 10px;
  font-size: 11px;
  font-weight: 500;
}
.metric-cell { text-align: right; font-variant-numeric: tabular-nums; }
.percept-cell { text-align: right; font-variant-numeric: tabular-nums; }
.heatbar {
  display: inline-block;
  height: 14px;
  border-radius: 2px;
  vertical-align: middle;
  margin-right: 6px;
  min-width: 4px;
}

/* ── Tooltip ── */
#tooltip {
  display: none;
  position: fixed;
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 12px 16px;
  font-size: 13px;
  max-width: 400px;
  z-index: 100;
  box-shadow: 0 4px 16px rgba(0,0,0,0.5);
}
#tooltip.show { display: block; }
#tooltip h3 { font-size: 14px; margin-bottom: 6px; }
#tooltip .row { display: flex; justify-content: space-between; gap: 16px; }
#tooltip .lbl { color: var(--fg2); }
#tooltip .section { margin-top: 8px; padding-top: 6px; border-top: 1px solid var(--border); font-size: 12px; color: var(--accent); font-weight: 600; }

/* ── Binding info ── */
.binding-info {
  display: flex;
  gap: 12px;
  margin-bottom: 16px;
  flex-wrap: wrap;
  font-size: 12px;
  color: var(--fg2);
}
.binding-chip {
  background: var(--bg2);
  border: 1px solid var(--border);
  border-radius: 4px;
  padding: 2px 8px;
}
.binding-chip .percept-name { color: var(--accent); font-weight: 600; }
.binding-chip .index-name { color: var(--fg); }

/* ── View toggle ── */
.view-toggle { display: flex; gap: 0; }
.view-toggle .btn { border-radius: 0; }
.view-toggle .btn:first-child { border-radius: 6px 0 0 6px; }
.view-toggle .btn:last-child { border-radius: 0 6px 6px 0; }
</style>
</head>
<body>

<div id="drop-zone">
  <div class="drop-area" id="drop-area">
    <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#8b949e" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12"/>
    </svg>
    <p>codedash --output json の出力をドロップ</p>
    <p style="font-size:12px">またはクリックして選択</p>
    <input type="file" id="file-input" accept=".json">
  </div>
</div>

<div id="app">
  <header>
    <h1 id="title">codedash viewer</h1>
    <div class="stats">
      <span><span class="val" id="s-total">0</span> nodes</span>
      <span><span class="val" id="s-groups">0</span> groups</span>
    </div>
  </header>

  <div id="binding-info" class="binding-info"></div>

  <div class="controls">
    <label>Kind</label>
    <select id="kind-filter">
      <option value="all">all</option>
    </select>

    <input id="search" type="text" placeholder="Search name / file...">

    <div class="view-toggle">
      <button class="btn active" data-view="treemap">Map</button>
      <button class="btn" data-view="table">Table</button>
    </div>

    <button class="btn" id="reload-btn">Load another</button>
  </div>

  <div id="treemap"></div>
  <div id="table-wrap" style="display:none">
    <table>
      <thead><tr id="thead-row"></tr></thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>
</div>

<div id="tooltip"></div>

<script>
// ============================================================
// State
// ============================================================
let DATA = null;
let ALL_ENTRIES = [];
let BINDINGS = [];
let PERCEPT_CHANNELS = [];
let currentView = 'treemap';
let sortCol = 'name';
let sortAsc = true;

// ============================================================
// File loading
// ============================================================
const dropZone = document.getElementById('drop-zone');
const dropArea = document.getElementById('drop-area');
const fileInput = document.getElementById('file-input');
const app = document.getElementById('app');

dropArea.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', e => {
  if (e.target.files[0]) loadFile(e.target.files[0]);
});

dropArea.addEventListener('dragover', e => {
  e.preventDefault();
  dropArea.classList.add('dragover');
});
dropArea.addEventListener('dragleave', () => dropArea.classList.remove('dragover'));
dropArea.addEventListener('drop', e => {
  e.preventDefault();
  dropArea.classList.remove('dragover');
  if (e.dataTransfer.files[0]) loadFile(e.dataTransfer.files[0]);
});

document.getElementById('reload-btn').addEventListener('click', () => {
  app.classList.remove('visible');
  dropZone.classList.remove('hidden');
  fileInput.value = '';
});

function loadFile(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      DATA = JSON.parse(e.target.result);
      processData();
      dropZone.classList.add('hidden');
      app.classList.add('visible');
      render();
    } catch (err) {
      alert('JSON parse error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ============================================================
// Data processing — uses pre-computed percept values from DSL
// ============================================================
function processData() {
  ALL_ENTRIES = DATA.entries || [];
  BINDINGS = DATA.bindings || [];
  PERCEPT_CHANNELS = BINDINGS.map(b => b.percept);

  // Populate kind filter
  const kinds = [...new Set(ALL_ENTRIES.map(n => n.kind))].sort();
  const kindFilter = document.getElementById('kind-filter');
  kindFilter.innerHTML = '<option value="all">all</option>';
  for (const k of kinds) {
    const opt = document.createElement('option');
    opt.value = k;
    opt.textContent = k;
    kindFilter.appendChild(opt);
  }

  // Stats
  document.getElementById('s-total').textContent = DATA.total || ALL_ENTRIES.length;
  document.getElementById('s-groups').textContent = (DATA.groups || []).length;

  // Show binding config
  const infoEl = document.getElementById('binding-info');
  infoEl.innerHTML = '';
  for (const b of BINDINGS) {
    const chip = document.createElement('span');
    chip.className = 'binding-chip';
    chip.innerHTML = `<span class="percept-name">${b.percept}</span> &larr; <span class="index-name">${b.index}</span>`;
    infoEl.appendChild(chip);
  }
}

// ============================================================
// Filtering
// ============================================================
function getFiltered() {
  const kind = document.getElementById('kind-filter').value;
  const search = document.getElementById('search').value.toLowerCase();
  return ALL_ENTRIES.filter(n => {
    if (kind !== 'all' && n.kind !== kind) return false;
    if (search && !n.name.toLowerCase().includes(search) && !n.file.toLowerCase().includes(search)) return false;
    return true;
  });
}

// ============================================================
// Kind colors
// ============================================================
const KIND_COLORS = {
  function: '#58a6ff', method: '#7ee787', struct: '#d2a8ff',
  enum: '#f0883e', trait: '#f778ba', impl: '#8b949e',
  fn: '#58a6ff', class: '#d2a8ff', interface: '#f778ba',
  component: '#7ee787', hook: '#79c0ff', type_alias: '#d2a8ff',
  const: '#ffa657', static: '#ffa657', variable: '#c9d1d9',
  module: '#8b949e', macro: '#ff7b72', store: '#ffa657',
  context: '#79c0ff',
};

function kindColor(kind) {
  return KIND_COLORS[kind] || '#8b949e';
}

// ============================================================
// Treemap — renders using DSL-computed percept values directly
// ============================================================
function renderTreemap() {
  const container = document.getElementById('treemap');
  container.innerHTML = '';
  const entries = getFiltered();

  // Sort by percept.size descending
  const hasSize = PERCEPT_CHANNELS.includes('size');
  const sorted = [...entries].sort((a, b) => {
    const sa = hasSize ? (a.percept.size || 0) : (a.lines || 1);
    const sb = hasSize ? (b.percept.size || 0) : (b.lines || 1);
    return sb - sa;
  });

  for (const entry of sorted) {
    const p = entry.percept || {};

    // Hue: DSL-computed (0-240 range typically)
    const hue = p.hue != null ? p.hue : 120;
    const bg = `hsl(${hue}, 70%, 45%)`;

    // Size: DSL-computed (0.2-5.0 range typically), scale to px
    const sizeVal = p.size != null ? p.size : 1;
    const side = 30 + sizeVal * 34;

    // Border: DSL-computed (0-3.0 range typically)
    const borderW = p.border != null ? Math.max(1, Math.round(p.border + 1)) : 1;

    // Opacity: DSL-computed (0.1-1.0 range typically)
    const opacity = p.opacity != null ? Math.max(0.15, p.opacity) : 1;

    const el = document.createElement('div');
    el.className = 'tnode';
    el.style.width = side + 'px';
    el.style.height = Math.max(24, side * 0.6) + 'px';
    el.style.background = bg;
    el.style.border = `${borderW}px solid ${adjustBrightness(bg, -20)}`;
    el.style.opacity = opacity;

    const label = document.createElement('span');
    label.className = 'label';
    label.textContent = entry.name;
    el.appendChild(label);

    el.addEventListener('mouseenter', e => showTooltip(e, entry));
    el.addEventListener('mouseleave', hideTooltip);
    el.addEventListener('mousemove', moveTooltip);

    container.appendChild(el);
  }
}

function adjustBrightness(hslStr, amount) {
  const match = hslStr.match(/hsl\(([^,]+),\s*(\d+)%,\s*(\d+)%\)/);
  if (!match) return hslStr;
  const l = Math.max(0, Math.min(100, parseInt(match[3]) + amount));
  return `hsl(${match[1]}, ${match[2]}%, ${l}%)`;
}

// ============================================================
// Table — raw metrics + percept values
// ============================================================
function buildColumns() {
  const cols = [
    { key: 'file', label: 'File', numeric: false },
    { key: 'name', label: 'Name', numeric: false },
    { key: 'kind', label: 'Kind', numeric: false },
    { key: 'lines', label: 'Lines', numeric: true },
    { key: 'params', label: 'Params', numeric: true },
    { key: 'cyclomatic', label: 'Cyclo', numeric: true },
    { key: 'depth', label: 'Depth', numeric: true },
    { key: 'git_churn_30d', label: 'Churn', numeric: true },
    { key: 'visibility', label: 'Vis', numeric: false },
  ];
  // Add percept columns from bindings
  for (const ch of PERCEPT_CHANNELS) {
    cols.push({ key: 'p:' + ch, label: ch, numeric: true, isPercept: true });
  }
  return cols;
}

function getEntryValue(entry, key) {
  if (key.startsWith('p:')) {
    const ch = key.slice(2);
    return entry.percept ? (entry.percept[ch] || 0) : 0;
  }
  return entry[key];
}

function renderTable() {
  const COLUMNS = buildColumns();
  const thead = document.getElementById('thead-row');
  thead.innerHTML = '';
  for (const col of COLUMNS) {
    const th = document.createElement('th');
    th.textContent = col.label;
    if (col.isPercept) th.style.color = 'var(--accent)';
    if (sortCol === col.key) {
      const arrow = document.createElement('span');
      arrow.className = 'arrow';
      arrow.textContent = sortAsc ? '\u25B2' : '\u25BC';
      th.appendChild(arrow);
    }
    th.addEventListener('click', () => {
      if (sortCol === col.key) sortAsc = !sortAsc;
      else { sortCol = col.key; sortAsc = col.numeric ? false : true; }
      renderTable();
    });
    thead.appendChild(th);
  }

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  let entries = getFiltered();

  entries.sort((a, b) => {
    const va = getEntryValue(a, sortCol), vb = getEntryValue(b, sortCol);
    if (typeof va === 'number' && typeof vb === 'number') {
      return sortAsc ? va - vb : vb - va;
    }
    const sa = String(va || ''), sb = String(vb || '');
    return sortAsc ? sa.localeCompare(sb) : sb.localeCompare(sa);
  });

  for (const entry of entries) {
    const tr = document.createElement('tr');
    for (const col of COLUMNS) {
      const td = document.createElement('td');
      const val = getEntryValue(entry, col.key);

      if (col.key === 'kind') {
        const badge = document.createElement('span');
        badge.className = 'kind-badge';
        badge.style.background = kindColor(entry.kind) + '22';
        badge.style.color = kindColor(entry.kind);
        badge.textContent = entry.kind;
        td.appendChild(badge);
      } else if (col.isPercept) {
        td.className = 'percept-cell';
        const numVal = typeof val === 'number' ? val : 0;
        td.textContent = numVal.toFixed(2);
      } else if (col.numeric) {
        td.className = 'metric-cell';
        td.textContent = val || 0;
      } else {
        td.textContent = val || '';
      }
      tr.appendChild(td);
    }
    tr.addEventListener('mouseenter', e => showTooltip(e, entry));
    tr.addEventListener('mouseleave', hideTooltip);
    tbody.appendChild(tr);
  }
}

// ============================================================
// Tooltip — shows raw metrics + DSL-computed percept values
// ============================================================
function showTooltip(e, entry) {
  const tip = document.getElementById('tooltip');
  tip.textContent = '';

  const h3 = document.createElement('h3');
  h3.textContent = entry.name;
  tip.appendChild(h3);

  // Raw metrics
  const metrics = [
    ['File', entry.file],
    ['Kind', entry.kind],
    ['Lines', `${entry.start_line}-${entry.end_line} (${entry.lines})`],
    ['Params', entry.params],
    ['Cyclomatic', entry.cyclomatic],
    ['Depth', entry.depth],
    ['Fields', entry.field_count],
    ['Churn (30d)', entry.git_churn_30d],
    ['Visibility', entry.visibility],
    ['Coverage', entry.coverage != null ? (entry.coverage * 100).toFixed(0) + '%' : 'n/a'],
  ];

  for (const [l, v] of metrics) {
    appendRow(tip, l, v);
  }

  // Percept values (DSL-computed)
  if (entry.percept && Object.keys(entry.percept).length > 0) {
    const section = document.createElement('div');
    section.className = 'section';
    section.textContent = 'Percepts (DSL)';
    tip.appendChild(section);

    for (const [ch, val] of Object.entries(entry.percept)) {
      const norm = entry.normalized ? entry.normalized[ch] : null;
      const display = typeof val === 'number' ? val.toFixed(2) : val;
      const normStr = norm != null ? ` (n=${(norm).toFixed(2)})` : '';
      appendRow(tip, ch, display + normStr);
    }
  }

  tip.classList.add('show');
  moveTooltip(e);
}

function appendRow(parent, label, value) {
  const row = document.createElement('div');
  row.className = 'row';
  const lbl = document.createElement('span');
  lbl.className = 'lbl';
  lbl.textContent = label;
  const val = document.createElement('span');
  val.textContent = value;
  row.appendChild(lbl);
  row.appendChild(val);
  parent.appendChild(row);
}

function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  const x = Math.min(e.clientX + 12, window.innerWidth - 420);
  const y = Math.min(e.clientY + 12, window.innerHeight - 300);
  tip.style.left = x + 'px';
  tip.style.top = y + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').classList.remove('show');
}

// ============================================================
// Render dispatch
// ============================================================
function render() {
  if (currentView === 'treemap') {
    document.getElementById('treemap').style.display = 'flex';
    document.getElementById('table-wrap').style.display = 'none';
    renderTreemap();
  } else {
    document.getElementById('treemap').style.display = 'none';
    document.getElementById('table-wrap').style.display = 'block';
    renderTable();
  }
}

// ============================================================
// Event bindings
// ============================================================
document.getElementById('kind-filter').addEventListener('change', render);
document.getElementById('search').addEventListener('input', render);

document.querySelectorAll('.view-toggle .btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.view-toggle .btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentView = btn.dataset.view;
    render();
  });
});
</script>
</body>
</html>
